name: Publish Server NuGet

on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (for example 1.2.3)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#server-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore WebNet.CatalogServer.csproj

      - name: Pack
        run: dotnet pack WebNet.CatalogServer.csproj -c Release -o artifacts/server /p:ContinuousIntegrationBuild=true /p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet (Trusted Publishing)
        run: dotnet nuget push "artifacts/server/*.nupkg" --source "https://api.nuget.org/v3/index.json" --skip-duplicate